apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-ops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-ops
  template:
    metadata:
      labels:
        app: agent-ops
    spec:
      serviceAccountName: bedrock-sa
      containers:
        - name: agent-ops
          image: 314630006302.dkr.ecr.us-east-1.amazonaws.com/fastapi-eks:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20